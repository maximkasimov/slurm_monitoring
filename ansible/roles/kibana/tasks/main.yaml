---
- name: Install kibana package
  ansible.builtin.apt:
    name: kibana
    state: present
    update_cache: true

- name: Install kibana configuration
  ansible.builtin.template:
    src: kibana.yaml.j2
    dest: "{{ kibana_conf_dir }}/{{ kibana_config_file }}"
    owner: root
    group: kibana
    mode: "0640"
  notify: Restart kibana

- name: Ensure kibana service is enabled and running
  ansible.builtin.systemd:
    name: kibana
    state: started
    enabled: true
