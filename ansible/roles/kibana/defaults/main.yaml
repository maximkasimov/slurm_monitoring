---
# defaults for kibana
kibana_conf_dir: /etc/kibana
kibana_config_file: kibana.yml
kibana_host_ip: 0.0.0.0
kibana_host_port: 5601

kibana_elasticsearch_host: "http://{{ es_host }}:{{ es_http_port }}"
kibana_enable_basic_auth: false
kibana_es_username: "{{ es_api_basic_auth_username | default('') }}"
kibana_es_password: "{{ es_api_basic_auth_password | default('') }}"
