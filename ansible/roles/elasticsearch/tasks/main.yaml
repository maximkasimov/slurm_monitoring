---
- name: Ensure apt transport dependencies are installed
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - gnupg
    state: present
    update_cache: true

- name: Add elasticsearch apt key
  ansible.builtin.apt_key:
    url: "{{ elasticsearch_apt_key_url }}"
    state: present

- name: Add elasticsearch apt repository
  ansible.builtin.apt_repository:
    repo: "{{ elasticsearch_apt_repo }}"
    state: present
    filename: "{{ elasticsearch_apt_repo_file }}"

- name: Install elasticsearch package
  ansible.builtin.apt:
    name: elasticsearch
    state: present
    update_cache: true

- name: Install elasticsearch configuration
  ansible.builtin.template:
    src: elasticsearch.yaml.j2
    dest: "{{ elasticsearch_conf_dir }}/{{ elasticsearch_config_file }}"
    owner: root
    group: elasticsearch
    mode: "0640"
  notify: Restart elasticsearch

- name: Ensure elasticsearch service is enabled and running
  ansible.builtin.systemd:
    name: elasticsearch
    state: started
    enabled: true
