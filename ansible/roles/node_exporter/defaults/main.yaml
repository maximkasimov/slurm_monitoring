---
# defaults for node-exporter
node_exporter_version: "1.8.1"
node_exporter_user: node_exporter
node_exporter_group: node_exporter

node_exporter_binary_path: /usr/local/bin/node_exporter
node_exporter_service_file: /etc/systemd/system/node_exporter.service

node_exporter_archive: "node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
node_exporter_download_url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/{{ node_exporter_archive }}"
node_exporter_extract_dir: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64"
node_exporter_download_dest: "/tmp/{{ node_exporter_archive }}"
node_exporter_validate_certs: true

node_exporter_web_listen_address: ":9100"
node_exporter_extra_args: []
