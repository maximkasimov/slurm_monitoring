---
- name: Ensure node_exporter group exists
  ansible.builtin.group:
    name: "{{ node_exporter_group }}"
    system: true

- name: Ensure node_exporter user exists
  ansible.builtin.user:
    name: "{{ node_exporter_user }}"
    group: "{{ node_exporter_group }}"
    shell: /usr/sbin/nologin
    system: true
    create_home: false

- name: Download node_exporter archive
  ansible.builtin.get_url:
    url: "{{ node_exporter_download_url }}"
    dest: "{{ node_exporter_download_dest }}"
    mode: "0644"
    validate_certs: "{{ node_exporter_validate_certs }}"

- name: Extract node_exporter archive
  ansible.builtin.unarchive:
    src: "{{ node_exporter_download_dest }}"
    dest: /tmp
    remote_src: true
    creates: "{{ node_exporter_extract_dir }}/node_exporter"

- name: Install node_exporter binary
  ansible.builtin.copy:
    src: "{{ node_exporter_extract_dir }}/node_exporter"
    dest: "{{ node_exporter_binary_path }}"
    owner: root
    group: root
    mode: "0755"
    remote_src: true
  notify: Restart node_exporter

- name: Install node_exporter systemd unit
  ansible.builtin.template:
    src: node_exporter.service.j2
    dest: "{{ node_exporter_service_file }}"
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart node_exporter

- name: Ensure node_exporter service is enabled and running
  ansible.builtin.systemd:
    name: node_exporter
    state: started
    enabled: true
