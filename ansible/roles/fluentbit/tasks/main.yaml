---
- name: Ensure apt transport dependencies are installed
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - gnupg
    state: present
    update_cache: true

- name: Add fluent-bit apt key
  ansible.builtin.apt_key:
    url: "{{ fluentbit_apt_key_url }}"
    state: present

- name: Add fluent-bit apt repository
  ansible.builtin.apt_repository:
    repo: "{{ fluentbit_apt_repo }}"
    state: present

- name: Install fluent-bit package
  ansible.builtin.apt:
    name: fluent-bit
    state: present
    update_cache: true

- name: Install fluent-bit configuration
  ansible.builtin.template:
    src: fluent-bit.conf.j2
    dest: "{{ fluentbit_config_file }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart fluent-bit

- name: Ensure fluent-bit service is enabled and running
  ansible.builtin.systemd:
    name: fluent-bit
    state: started
    enabled: true
