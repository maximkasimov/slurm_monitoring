---
- name: Ensure prometheus group exists
  ansible.builtin.group:
    name: "{{ prometheus_group }}"
    system: true

- name: Ensure prometheus user exists
  ansible.builtin.user:
    name: "{{ prometheus_user }}"
    group: "{{ prometheus_group }}"
    shell: /usr/sbin/nologin
    system: true
    create_home: false

- name: Ensure prometheus directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ prometheus_config_dir }}", owner: root, group: "{{ prometheus_group }}", mode: "0750" }
    - { path: "{{ prometheus_data_dir }}", owner: "{{ prometheus_user }}", group: "{{ prometheus_group }}", mode: "0750" }

- name: Download prometheus archive
  ansible.builtin.get_url:
    url: "{{ prometheus_download_url }}"
    dest: "{{ prometheus_download_dest }}"
    mode: "0644"
    validate_certs: "{{ prometheus_validate_certs }}"

- name: Extract prometheus archive
  ansible.builtin.unarchive:
    src: "{{ prometheus_download_dest }}"
    dest: /tmp
    remote_src: true
    creates: "{{ prometheus_extract_dir }}/prometheus"

- name: Install prometheus binary
  ansible.builtin.copy:
    src: "{{ prometheus_extract_dir }}/prometheus"
    dest: "{{ prometheus_binary_path }}"
    owner: root
    group: root
    mode: "0755"
    remote_src: true
  notify: Restart prometheus

- name: Install prometheus configuration
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ prometheus_config_dir }}/{{ prometheus_config_file }}"
    owner: root
    group: "{{ prometheus_group }}"
    mode: "0640"
  notify: Reload prometheus

- name: Install prometheus systemd unit
  ansible.builtin.template:
    src: prometheus.service.j2
    dest: "{{ prometheus_service_file }}"
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart prometheus

- name: Ensure prometheus service is enabled and running
  ansible.builtin.systemd:
    name: prometheus
    state: started
    enabled: true
